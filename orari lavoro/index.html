<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cartellino — Le mie ore</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg: #0F2224;
    --bg-2: #15302F;
    --panel: #1B3937;
    --panel-2: #223F3D;
    --ink: #F2EEDD;
    --ink-dim: #9FB6AC;
    --amber: #E3A73C;
    --amber-dim: #7A6230;
    --red: #E1613F;
    --red-dim: #4A2A20;
    --green: #7FAE8C;
    --line: rgba(242,238,221,0.08);
    --radius: 18px;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(120% 100% at 50% 0%, var(--bg-2) 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overscroll-behavior: none;
  }

  @font-face{
    font-family: 'SG';
    src: local('Space Grotesk');
  }

  .app{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 22px 16px 110px 16px;
    display:flex;
    flex-direction:column;
    gap: 18px;
  }

  header{
    display:flex;
    flex-direction: column;
    gap: 2px;
  }
  header .eyebrow{
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 600;
  }
  header h1{
    margin:0;
    font-family: 'SG','Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* --- Week nav --- */
  .week-nav{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-top: 8px;
  }
  .week-btn{
    flex:none;
    width: 34px; height: 34px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    font-size: 15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .week-btn:active{ background: var(--panel-2); }
  .week-label-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width:0;
  }
  .week-label{
    font-family:'SG','Space Grotesk',sans-serif;
    font-weight:600;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }
  .week-tag{
    font-size: 10px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight:700;
    margin-top:1px;
    height: 12px;
  }
  .storico-btn{
    flex:none;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
    font-size: 12px;
    font-weight:600;
    padding: 8px 12px;
    border-radius: 10px;
    cursor:pointer;
  }
  .storico-btn:active{ background: rgba(242,238,221,0.05); }

  /* --- Gauge --- */
  .gauge-card{
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border-radius: var(--radius);
    border: 1px solid var(--line);
    padding: 20px;
    display:flex;
    align-items:center;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }
  .gauge-card::before{
    content:"";
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(115deg, transparent 0 26px, rgba(242,238,221,0.02) 26px 27px);
    pointer-events:none;
  }
  .gauge-wrap{ position:relative; width:118px; height:118px; flex:none; }
  .gauge-wrap svg{ width:100%; height:100%; display:block; }
  .gauge-arc-track{ fill:none; stroke:rgba(242,238,221,0.08); stroke-width:10; }
  .gauge-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .gauge-center .num{
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 24px;
    font-weight: 700;
    line-height:1;
  }
  .gauge-center .lbl{
    font-size: 9px;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .gauge-info{ flex:1; min-width:0; }
  .gauge-info .status-badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size: 12px; font-weight: 600;
    padding: 5px 10px;
    border-radius: 999px;
    margin-bottom: 8px;
  }
  .status-ok{ background: rgba(127,174,140,0.16); color: var(--green); }
  .status-over{ background: rgba(225,97,63,0.16); color: var(--red); }
  .gauge-info .msg{ font-size: 13px; color: var(--ink); line-height:1.4; }
  .gauge-info .msg b{ font-variant-numeric: tabular-nums; }

  /* --- Day cards --- */
  .days{ display:flex; flex-direction:column; gap: 10px; }

  .day{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 14px 12px 14px;
  }
  .day-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 8px;
  }
  .day-name-wrap{ display:flex; align-items:center; gap:10px; }
  .stamp{
    width: 30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'SG','Space Grotesk',sans-serif;
    font-size: 11px; font-weight:700;
    background: var(--bg-2);
    color: var(--ink-dim);
    border: 1.5px dashed var(--line);
    flex:none;
    transition: all .25s ease;
  }
  .stamp.filled{
    color: var(--amber);
    border-color: var(--amber-dim);
    background: rgba(227,167,60,0.08);
  }
  .day-name{ font-weight: 600; font-size: 15px; }
  .day-date{ font-size:11px; color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .day-head-right{ display:flex; align-items:center; gap:10px; flex:none; }
  .day-total{
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    color: var(--ink-dim);
  }
  .day-total.has-time{ color: var(--ink); }

  .riposo-toggle{
    flex:none;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
    cursor:pointer;
    white-space: nowrap;
  }
  .riposo-toggle.active{
    color: var(--green);
    border-color: rgba(127,174,140,0.4);
    background: rgba(127,174,140,0.12);
  }
  .stamp.riposo{
    color: var(--green);
    border-color: rgba(127,174,140,0.4);
    background: rgba(127,174,140,0.1);
    font-size: 14px;
  }
  .day.is-riposo{ opacity: 0.9; }
  .riposo-msg{
    text-align:center;
    color: var(--ink-dim);
    font-size: 13px;
    padding: 10px 0 4px 0;
  }

  .turni{ display:flex; flex-direction:column; gap:8px; }
  .turno{
    display:flex; align-items:center; gap:8px;
  }
  .turno input[type="time"]{
    flex:1;
    min-width:0;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 10px;
    padding: 8px 8px;
    font-family: inherit;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    color-scheme: dark;
  }
  .turno .arrow{ color: var(--ink-dim); font-size: 13px; flex:none; }
  .turno .rm{
    flex:none;
    width:28px; height:28px;
    border-radius:8px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--ink-dim);
    font-size: 15px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .turno .rm:active{ background: var(--red-dim); color: var(--red); }

  .add-turno{
    margin-top: 8px;
    width:100%;
    padding: 9px;
    border-radius: 10px;
    border: 1px dashed var(--line);
    background: transparent;
    color: var(--ink-dim);
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
  }
  .add-turno:active{ background: rgba(242,238,221,0.05); }

  /* --- Footer summary --- */
  .footer{
    position: fixed;
    left:0; right:0; bottom:0;
    display:flex; justify-content:center;
    padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    pointer-events:none;
  }
  .footer-card{
    pointer-events:auto;
    width:100%; max-width: 448px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 16px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .footer-card .f-lbl{ font-size: 11px; color: var(--ink-dim); text-transform:uppercase; letter-spacing:0.08em; }
  .footer-card .f-val{
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 20px; font-weight:700;
  }
  .footer-card .f-val.over{ color: var(--red); }
  .footer-card .f-val.ok{ color: var(--ink); }
  .reset-btn{
    flex:none;
    background:transparent;
    border: 1px solid var(--line);
    color: var(--ink-dim);
    font-size: 11px;
    padding: 7px 10px;
    border-radius: 9px;
    cursor:pointer;
  }
  .reset-btn:active{ background: rgba(225,97,63,0.12); color: var(--red); }

  ::placeholder{ color: var(--ink-dim); opacity:0.6; }

  /* --- Tabella riepilogo condivisibile --- */
  .summary-card{
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 14px 14px 14px;
  }
  .summary-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .summary-title{
    font-family:'SG','Space Grotesk',sans-serif;
    font-weight:700;
    font-size: 15px;
  }
  .summary-range{
    font-size: 12px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .summary-table{
    width:100%;
    border-collapse: collapse;
  }
  .summary-table td{
    padding: 7px 2px;
    font-size: 13px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .summary-table tr:last-child td{ border-bottom:none; }
  .summary-table .s-day{
    font-weight:600;
    width: 78px;
  }
  .summary-table .s-day .s-date{
    display:block;
    font-weight:400;
    font-size: 10px;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .summary-table .s-orario{
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }
  .summary-table .s-orario.dim{ color: var(--ink-dim); }
  .summary-table .s-orario.riposo{ color: var(--green); font-weight:600; }
  .summary-table .s-ore{
    text-align:right;
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-weight:600;
    white-space:nowrap;
  }
  .summary-foot{
    display:flex; align-items:center; justify-content:space-between;
    margin-top: 10px;
    padding: 10px 10px 2px 10px;
    border-top: 1px solid var(--line);
  }
  .summary-foot .s-lbl{ font-size:12px; color: var(--ink-dim); }
  .summary-foot .s-tot{
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-weight:700;
    font-size: 16px;
  }
  .summary-foot .s-tot.over{ color: var(--red); }

  /* --- Storico overlay --- */
  .storico-overlay{
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    display:none;
    flex-direction: column;
  }
  .storico-overlay.open{ display:flex; }
  .storico-head{
    display:flex; align-items:center; gap:10px;
    padding: 22px 16px 12px 16px;
    max-width: 480px; width:100%; margin:0 auto;
  }
  .storico-head h2{
    margin:0; flex:1;
    font-family:'SG','Space Grotesk',sans-serif;
    font-size: 20px; font-weight:700;
  }
  .storico-close{
    width:34px; height:34px; border-radius:10px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink);
    font-size:16px;
    cursor:pointer;
  }
  .storico-list{
    flex:1;
    overflow-y:auto;
    max-width: 480px; width:100%; margin:0 auto;
    padding: 4px 16px 40px 16px;
    display:flex; flex-direction:column; gap:8px;
  }
  .storico-empty{
    color: var(--ink-dim);
    font-size: 13px;
    text-align:center;
    margin-top: 60px;
    line-height:1.5;
  }
  .storico-row{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 13px 14px;
    cursor:pointer;
  }
  .storico-row:active{ background: var(--panel-2); }
  .storico-row .range{ font-size:14px; font-weight:600; }
  .storico-row .year{ font-size:11px; color:var(--ink-dim); margin-top:1px; }
  .storico-row .right{ display:flex; align-items:center; gap:10px; }
  .storico-row .tot{
    font-family:'SG','Space Grotesk',sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight:700;
  }
  .storico-row .tot.over{ color: var(--red); }
  .storico-row .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--green);
    flex:none;
  }
  .storico-row .dot.over{ background: var(--red); }
  .storico-row .current-tag{
    font-size:9px; text-transform:uppercase; letter-spacing:0.06em;
    color: var(--amber); font-weight:700;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Contratto 30h / settimana</div>
    <h1>Cartellino</h1>
    <div class="week-nav">
      <button class="week-btn" id="prevWeek">‹</button>
      <div class="week-label-wrap">
        <div class="week-label" id="weekLabel">—</div>
        <div class="week-tag" id="weekTag"></div>
      </div>
      <button class="week-btn" id="nextWeek">›</button>
      <button class="storico-btn" id="openStorico">Storico</button>
    </div>
  </header>

  <div class="gauge-card">
    <div class="gauge-wrap">
      <svg viewBox="0 0 120 120">
        <circle class="gauge-arc-track" cx="60" cy="60" r="50"/>
        <circle id="gaugeArc" cx="60" cy="60" r="50" fill="none" stroke="var(--amber)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="314.159" stroke-dashoffset="314.159"
          transform="rotate(-90 60 60)" style="transition: stroke-dashoffset .5s ease, stroke .3s ease;"/>
      </svg>
      <div class="gauge-center">
        <div class="num" id="gaugeNum">0.0h</div>
        <div class="lbl">di 30h</div>
      </div>
    </div>
    <div class="gauge-info">
      <div class="status-badge status-ok" id="statusBadge">— nessuna ora —</div>
      <div class="msg" id="statusMsg">Aggiungi i turni della settimana qui sotto.</div>
    </div>
  </div>

  <div class="days" id="daysContainer"></div>

  <div class="summary-card" id="summaryCard">
    <div class="summary-head">
      <div class="summary-title">Turni della settimana</div>
      <div class="summary-range" id="summaryRange">—</div>
    </div>
    <table class="summary-table">
      <tbody id="summaryBody"></tbody>
    </table>
    <div class="summary-foot">
      <div class="s-lbl">Totale</div>
      <div class="s-tot" id="summaryTotal">0h 00m</div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-card">
    <div>
      <div class="f-lbl">Totale settimana</div>
      <div class="f-val ok" id="footTotal">0h 00m</div>
    </div>
    <button class="reset-btn" id="resetBtn">Azzera settimana</button>
  </div>
</div>

<div class="storico-overlay" id="storicoOverlay">
  <div class="storico-head">
    <h2>Storico settimane</h2>
    <button class="storico-close" id="closeStorico">✕</button>
  </div>
  <div class="storico-list" id="storicoList"></div>
</div>

<script>
const GIORNI = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];
const MESI = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
const CONTRATTO_ORE = 30;
const CONTRATTO_MIN = CONTRATTO_ORE * 60;
const STORAGE_KEY = "cartellino-weeks";

let weeks = {};        // { "2026-06-29": { Lunedì:[{start,end}], ... }, ... }
let currentMonday = getMonday(new Date());
let todayKey = weekKey(currentMonday);
let state = null;      // reference to weeks[weekKey(currentMonday)]

function getMonday(d){
  const date = new Date(d);
  const day = date.getDay(); // 0=Dom
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function addDays(d, n){
  const nd = new Date(d);
  nd.setDate(nd.getDate() + n);
  return nd;
}
function weekKey(monday){
  return monday.toISOString().slice(0,10);
}
function ensureWeek(key){
  if(!weeks[key]) weeks[key] = {};
  GIORNI.forEach(g => {
    const existing = weeks[key][g];
    if(!existing){
      weeks[key][g] = { turni: [], riposo: false };
    } else if(Array.isArray(existing)){
      weeks[key][g] = { turni: existing, riposo: false };
    } else {
      if(!Array.isArray(existing.turni)) existing.turni = [];
      if(typeof existing.riposo !== 'boolean') existing.riposo = false;
    }
  });
  return weeks[key];
}
function dayLabel(d){
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}
function weekRangeLabel(monday, withYear){
  const sunday = addDays(monday, 6);
  let label = `${monday.getDate()} ${MESI[monday.getMonth()]} – ${sunday.getDate()} ${MESI[sunday.getMonth()]}`;
  if(withYear) label += ` ${sunday.getFullYear()}`;
  return label;
}

function minutesFromTime(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
function turnoMinuti(turno){
  const s = minutesFromTime(turno.start);
  const e = minutesFromTime(turno.end);
  if(s===null || e===null) return 0;
  let diff = e - s;
  if(diff < 0) diff += 24*60; // turno notturno
  return diff;
}
function giornoMinuti(giorno){
  const d = state[giorno];
  if(!d || d.riposo) return 0;
  return (d.turni||[]).reduce((acc,t)=>acc+turnoMinuti(t),0);
}
function totaleSettimanaMinuti(){
  return GIORNI.reduce((acc,g)=>acc+giornoMinuti(g),0);
}
function totaleMinutiDiSettimana(weekObj){
  return GIORNI.reduce((acc,g)=>{
    const d = weekObj[g];
    if(!d || d.riposo) return acc;
    const turni = Array.isArray(d) ? d : (d.turni||[]);
    return acc + turni.reduce((a,t)=>a+turnoMinuti(t),0);
  }, 0);
}

function fmt(mins){
  const h = Math.floor(mins/60);
  const m = mins%60;
  return h + "h " + String(m).padStart(2,'0') + "m";
}
function fmtShort(mins){
  return (mins/60).toFixed(1) + "h";
}

function switchToWeek(monday){
  currentMonday = getMonday(monday);
  const key = weekKey(currentMonday);
  state = ensureWeek(key);
  renderWeekNav();
  render();
}

function renderWeekNav(){
  document.getElementById('weekLabel').textContent = weekRangeLabel(currentMonday, false);
  const key = weekKey(currentMonday);
  document.getElementById('weekTag').textContent = key === todayKey ? 'Settimana corrente' : '';
}

function render(){
  const container = document.getElementById('daysContainer');
  container.innerHTML = '';

  GIORNI.forEach((giorno, i) => {
    const dayData = state[giorno];
    const riposo = !!dayData.riposo;
    const mins = giornoMinuti(giorno);
    const turni = dayData.turni || [];
    const data = addDays(currentMonday, i);

    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (riposo ? ' is-riposo' : '');

    const head = document.createElement('div');
    head.className = 'day-head';
    head.innerHTML = `
      <div class="day-name-wrap">
        <div class="stamp ${riposo?'riposo':(mins>0?'filled':'')}">${riposo?'😴':giorno.slice(0,3).toUpperCase()}</div>
        <div>
          <div class="day-name">${giorno}</div>
          <div class="day-date">${dayLabel(data)}</div>
        </div>
      </div>
      <div class="day-head-right">
        <button class="riposo-toggle ${riposo?'active':''}" data-giorno="${giorno}">${riposo?'Riposo':'+ Riposo'}</button>
        <div class="day-total ${mins>0?'has-time':''}">${riposo?'':(mins>0?fmt(mins):'—')}</div>
      </div>
    `;
    dayEl.appendChild(head);
    head.querySelector('.riposo-toggle').addEventListener('click', ()=>{
      dayData.riposo = !dayData.riposo;
      if(dayData.riposo) dayData.turni = [];
      save(); render();
    });

    if(riposo){
      const riposoMsg = document.createElement('div');
      riposoMsg.className = 'riposo-msg';
      riposoMsg.textContent = 'Giornata di riposo 🛌';
      dayEl.appendChild(riposoMsg);
    } else {
      const turniWrap = document.createElement('div');
      turniWrap.className = 'turni';

      turni.forEach((turno, idx) => {
        const row = document.createElement('div');
        row.className = 'turno';
        row.innerHTML = `
          <input type="time" value="${turno.start||''}" data-role="start">
          <span class="arrow">→</span>
          <input type="time" value="${turno.end||''}" data-role="end">
          <button class="rm">✕</button>
        `;
        const startInput = row.querySelector('[data-role="start"]');
        const endInput = row.querySelector('[data-role="end"]');
        
        // MODIFICA QUI: Usiamo 'blur' al posto di 'change' per evitare la chiusura immediata su iOS
        startInput.addEventListener('blur', e=>{
          dayData.turni[idx].start = e.target.value;
          save(); render();
        });
        endInput.addEventListener('blur', e=>{
          dayData.turni[idx].end = e.target.value;
          save(); render();
        });
        
        row.querySelector('.rm').addEventListener('click', ()=>{
          dayData.turni.splice(idx,1);
          save(); render();
        });
        turniWrap.appendChild(row);
      });

      dayEl.appendChild(turniWrap);

      const addBtn = document.createElement('button');
      addBtn.className = 'add-turno';
      addBtn.textContent = '+ Aggiungi turno';
      addBtn.addEventListener('click', ()=>{
        dayData.turni.push({start:'', end:''});
        save(); render();
      });
      dayEl.appendChild(addBtn);
    }

    container.appendChild(dayEl);
  });

  updateSummary();
  renderSummaryTable();
}

function updateSummary(){
  const totMin = totaleSettimanaMinuti();
  const pct = Math.min(totMin/CONTRATTO_MIN, 1.3);

  const circumference = 314.159;
  const offset = circumference * (1 - Math.min(pct,1));
  const arc = document.getElementById('gaugeArc');
  if(arc) {
    arc.style.strokeDashoffset = offset;
    const over = totMin > CONTRATTO_MIN;
    arc.style.stroke = over ? 'var(--red)' : 'var(--amber)';
  }

  document.getElementById('gaugeNum').textContent = fmtShort(totMin);

  const badge = document.getElementById('statusBadge');
  const msg = document.getElementById('statusMsg');
  const footVal = document.getElementById('footTotal');

  footVal.textContent = fmt(totMin);
  const over = totMin > CONTRATTO_MIN;
  footVal.className = 'f-val ' + (over ? 'over' : 'ok');

  if(totMin === 0){
    badge.className = 'status-badge status-ok';
    badge.textContent = '— nessuna ora —';
    msg.textContent = 'Aggiungi i turni della settimana qui sotto.';
  } else if(over){
    const extra = totMin - CONTRATTO_MIN;
    badge.className = 'status-badge status-over';
    badge.textContent = '⚠ oltre contratto';
    msg.innerHTML = `Hai superato le 30h di <b>${fmt(extra)}</b>.`;
  } else {
    const mancano = CONTRATTO_MIN - totMin;
    badge.className = 'status-badge status-ok';
    badge.textContent = '✓ nella norma';
    msg.innerHTML = `Mancano <b>${fmt(mancano)}</b> per arrivare a 30h.`;
  }
}

function renderSummaryTable(){
  document.getElementById('summaryRange').textContent = weekRangeLabel(currentMonday, false);

  const body = document.getElementById('summaryBody');
  body.innerHTML = '';

  GIORNI.forEach((giorno, i) => {
    const dayData = state[giorno];
    const riposo = !!dayData.riposo;
    const turni = dayData.turni || [];
    const mins = giornoMinuti(giorno);
    const data = addDays(currentMonday, i);

    let orarioText, orarioClass;
    if(riposo){
      orarioText = 'Riposo';
      orarioClass = 'riposo';
    } else if(turni.length === 0 || turni.every(t=>!t.start && !t.end)){
      orarioText = '—';
      orarioClass = 'dim';
    } else {
      orarioText = turni
        .filter(t=>t.start && t.end)
        .map(t=>`${t.start}–${t.end}`)
        .join(', ');
      orarioClass = '';
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="s-day">${giorno.slice(0,3)}<span class="s-date">${dayLabel(data)}</span></td>
      <td class="s-orario ${orarioClass}">${orarioText}</td>
      <td class="s-ore">${(!riposo && mins>0) ? fmt(mins) : ''}</td>
    `;
    body.appendChild(tr);
  });

  const totMin = totaleSettimanaMinuti();
  const over = totMin > CONTRATTO_MIN;
  const totEl = document.getElementById('summaryTotal');
  totEl.textContent = fmt(totMin);
  totEl.className = 's-tot' + (over ? ' over' : '');
}

/* --- Storico --- */
function renderStorico(){
  const list = document.getElementById('storicoList');
  list.innerHTML = '';

  const keys = Object.keys(weeks)
    .filter(k => totaleMinutiDiSettimana(weeks[k]) > 0 || k === todayKey)
    .sort((a,b)=> b.localeCompare(a));

  if(keys.length === 0){
    list.innerHTML = '<div class="storico-empty">Nessuna settimana registrata ancora.<br>Inizia ad aggiungere i turni per vederli qui.</div>';
    return;
  }

  keys.forEach(key => {
    const monday = new Date(key + 'T00:00:00');
    const totMin = totaleMinutiDiSettimana(weeks[key]);
    const over = totMin > CONTRATTO_MIN;

    const row = document.createElement('div');
    row.className = 'storico-row';
    row.innerHTML = `
      <div>
        <div class="range">${weekRangeLabel(monday, false)}</div>
        <div class="year">${monday.getFullYear()}${key===todayKey?' · <span class="current-tag">corrente</span>':''}</div>
      </div>
      <div class="right">
        <span class="dot ${over?'over':''}"></span>
        <span class="tot ${over?'over':''}">${totMin>0?fmt(totMin):'—'}</span>
      </div>
    `;
    row.addEventListener('click', ()=>{
      switchToWeek(monday);
      closeStorico();
    });
    list.appendChild(row);
  });
}
function openStoricoFn(){
  renderStorico();
  document.getElementById('storicoOverlay').classList.add('open');
}
function closeStorico(){
  document.getElementById('storicoOverlay').classList.remove('open');
}

function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(weeks));
  }catch(err){
    console.error('Errore salvataggio', err);
  }
}

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      weeks = JSON.parse(raw);
    }
  }catch(err){
  }
  state = ensureWeek(todayKey);
  renderWeekNav();
  render();
}

document.getElementById('prevWeek').addEventListener('click', ()=>{
  switchToWeek(addDays(currentMonday, -7));
});
document.getElementById('nextWeek').addEventListener('click', ()=>{
  switchToWeek(addDays(currentMonday, 7));
});
document.getElementById('openStorico').addEventListener('click', openStoricoFn);
document.getElementById('closeStorico').addEventListener('click', closeStorico);

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(confirm('Azzerare tutti i turni di questa settimana?')){
    GIORNI.forEach(g=>{ state[g].turni = []; state[g].riposo = false; });
    save(); render();
  }
});

load();
</script>
</body>
</html>
